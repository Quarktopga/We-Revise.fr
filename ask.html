<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>We Revise — ✦ASK</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="style.css">

<body data-page="ask">

    <!-- HEADER dynamique -->
    <header></header>

    <div class="page-container">
        <main>
            <h2>✦ASK — Assistant We Revise</h2>

            <p style="color:#555;margin-bottom:15px;">
                Pose une question sur We Revise.  
            </p>

            <input id="ask-input" type="text" placeholder="Ex : Comment ajouter une fiche ?" />

            <button class="btn" id="ask-btn" style="margin-top:12px;">Demander</button>

            <div id="ask-response" class="ask-response"></div>

            <div style="margin-top:20px;">
                <p style="color:#555;font-size:14px;">
                    ✦ASK répond uniquement à des questions sur We Revise. Les requêtes sont susceptibles d'être enregistrées pour améliorer l'assistant et le fonctionnement global de la plateforme. Ne partagez aucune information personnelle ou sensible.
                </p>
        </main>
    </div>

    <!-- FOOTER dynamique -->
    <footer></footer>

    <script src="header-footer.js"></script>
    <script src="ask.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase.js"></script>
    

<script src="analytics.js"></script>

</html>
